<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EFECCtive Verification</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', Arial, sans-serif;
      background: linear-gradient(135deg, #dff0ff 0%, #e8f8f4 50%, #d6f0ff 100%);
      min-height: 100vh;
    }

    .container {
      text-align: center;
      padding: 60px 20px 40px;
    }

    /* ── HERO ── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-bottom: 28px;
    }

    .shield-wrap {
      width: 72px;
      height: 72px;
      margin-bottom: 8px;
    }

    .hero h1 {
      font-size: 40px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #1a2d4a;
      margin: 0;
      line-height: 1;
    }

    .hero h1 span { color: #00bfa6; }

    .hero > p {
      color: #5a7a8a;
      font-size: 13px;
      letter-spacing: 0.4px;
      font-weight: 500;
    }

    /* ── SEARCH BOX ── */
    .search-box {
      margin-top: 18px;
      width: 100%;
      max-width: 420px;
    }

    .search-label {
      font-size: 17px;
      font-weight: 600;
      color: #1a2d4a;
      margin-bottom: 12px;
      display: block;
    }

    .search-row {
      display: flex;
      align-items: center;
      background: white;
      border-radius: 50px;
      padding: 6px 6px 6px 16px;
      box-shadow: 0 2px 12px rgba(0,80,120,0.10);
      border: 1.5px solid rgba(0,191,166,0.2);
    }

    .search-box input {
      border: none;
      outline: none;
      flex: 1;
      font-size: 13.5px;
      color: #4a6070;
      background: transparent;
      font-family: 'Outfit', Arial, sans-serif;
      padding: 6px 0;
    }

    .search-box input::placeholder { color: #b0c8d0; }

    .search-box button {
      background: linear-gradient(135deg, #00bfa6, #1e88e5);
      border: none;
      border-radius: 50px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }

    .search-box button:hover { opacity: 0.88; }

    /* ── CARDS ── */
    .cards {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-top: 32px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      border-radius: 16px;
      width: 112px;
      padding: 18px 10px 14px;
      box-shadow: 0 4px 14px rgba(0,80,120,0.08);
      border: 1.5px solid transparent;
      cursor: pointer;
      transition: all 0.22s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,80,120,0.13);
    }

    .card.active { border-color: #00bfa6; }

    .card-icon { width: 44px; height: 44px; }

    .card h3 {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.6px;
      color: #1a2d4a;
      text-transform: uppercase;
      margin: 0;
    }

    .card p {
      font-size: 10px;
      color: #7a9aaa;
      line-height: 1.4;
      text-align: center;
      margin: 0;
    }

    .card-arrow {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00bfa6, #1e88e5);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
    }

    /* ── RESULT ── */
    #result {
      margin-top: 28px;
      font-size: 17px;
      font-weight: 600;
      min-height: 28px;
    }

    .valid   { color: #0f6e56; }
    .invalid { color: #a32d2d; }
    .used    { color: #854f0b; }

    /* ── FOOTER BADGES ── */
    .footer-badges {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 32px;
      flex-wrap: wrap;
    }

    .badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #4a7a8a;
      font-weight: 500;
    }

    .badge-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bd-green { background: #e1f5ee; }
    .bd-blue  { background: #e6f1fb; }
    .bd-teal  { background: #e1f5ee; }
    .bd-gray  { background: #f1efe8; }

    @media (max-width: 480px) {
      .hero h1 { font-size: 32px; }
      .cards   { gap: 10px; }
      .card    { width: 90px; padding: 14px 8px 10px; }
      .card h3 { font-size: 10px; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="hero">

    <div class="shield-wrap">
      <svg viewBox="0 0 72 80" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="shG1" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#1e88e5"/>
            <stop offset="100%" stop-color="#00bfa6"/>
          </linearGradient>
          <linearGradient id="shG2" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0d6bcf"/>
            <stop offset="100%" stop-color="#009e8a"/>
          </linearGradient>
          <linearGradient id="innerG" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
          </linearGradient>
        </defs>
        <path d="M36 2 L68 14 L68 42 C68 58 54 72 36 78 C18 72 4 58 4 42 L4 14 Z" fill="url(#shG1)"/>
        <path d="M36 8 L62 18 L62 42 C62 55 50 67 36 72 C22 67 10 55 10 42 L10 18 Z" fill="url(#shG2)"/>
        <path d="M36 8 L62 18 L62 30 C52 26 42 24 36 24 C30 24 20 26 10 30 L10 18 Z" fill="url(#innerG)"/>
        <rect x="25" y="28" width="22" height="3" rx="1.5" fill="white" opacity="0.9"/>
        <rect x="25" y="34" width="18" height="2.5" rx="1.25" fill="white" opacity="0.7"/>
        <rect x="25" y="40" width="14" height="2.5" rx="1.25" fill="white" opacity="0.5"/>
        <circle cx="48" cy="50" r="9" fill="#00bfa6" stroke="white" stroke-width="2"/>
        <polyline points="43.5,50 46.5,53 52.5,46" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <ellipse cx="36" cy="42" rx="26" ry="8" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1" stroke-dasharray="4 3"/>
      </svg>
    </div>

    <h1>EFECc<span>tive</span></h1>
    <p>Timely verification. Trusted Protection.</p>

    <div class="search-box">
      <span class="search-label">Select a verification type to get started</span>
      <div class="search-row">
        <svg width="15" height="15" viewBox="0 0 20 20" fill="none" style="margin-right:8px;flex-shrink:0">
          <circle cx="9" cy="9" r="6.5" stroke="#aac4cc" stroke-width="2"/>
          <line x1="14" y1="14" x2="18" y2="18" stroke="#aac4cc" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input id="code" type="text" placeholder="Enter details, upload file, or scan…"/>
        <button onclick="doSearch()">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <path d="M3 8h10M9 4l4 4-4 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div class="cards">

    <div class="card active" onclick="selectCard(this,'CHEQUE')">
      <svg class="card-icon" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="12" width="36" height="24" rx="4" fill="#e6f1fb"/>
        <rect x="4" y="12" width="36" height="8" rx="3" fill="#1e88e5" opacity="0.18"/>
        <rect x="8" y="24" width="16" height="2" rx="1" fill="#1e88e5" opacity="0.6"/>
        <rect x="8" y="28" width="10" height="2" rx="1" fill="#1e88e5" opacity="0.4"/>
        <rect x="28" y="24" width="8" height="6" rx="2" fill="#00bfa6" opacity="0.7"/>
        <circle cx="34" cy="38" r="6" fill="#00bfa6"/>
        <polyline points="31,38 33.2,40.2 37.5,35.5" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <h3>Cheque</h3>
      <p>Verify and process cheque details</p>
      <div class="card-arrow">
        <svg width="10" height="10" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>

    <div class="card" onclick="selectCard(this,'DOCUMENT')">
      <svg class="card-icon" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
        <rect x="10" y="4" width="24" height="32" rx="3" fill="#ede8fc"/>
        <path d="M26 4 L34 12 L26 12 Z" fill="#b0a0e8"/>
        <rect x="14" y="16" width="16" height="2" rx="1" fill="#7f77dd" opacity="0.6"/>
        <rect x="14" y="20" width="12" height="2" rx="1" fill="#7f77dd" opacity="0.4"/>
        <rect x="14" y="24" width="14" height="2" rx="1" fill="#7f77dd" opacity="0.4"/>
        <circle cx="34" cy="36" r="6" fill="#534ab7"/>
        <polyline points="31,36 33.2,38.2 37.5,33.5" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <h3>Document</h3>
      <p>Upload &amp; authenticate documents</p>
      <div class="card-arrow">
        <svg width="10" height="10" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>

    <div class="card" onclick="selectCard(this,'CERTIFICATE')">
      <svg class="card-icon" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
        <rect x="8" y="4" width="24" height="30" rx="3" fill="#eaf3de"/>
        <rect x="8" y="4" width="24" height="8" rx="3" fill="#639922" opacity="0.2"/>
        <rect x="12" y="16" width="16" height="2" rx="1" fill="#639922" opacity="0.5"/>
        <rect x="12" y="20" width="12" height="2" rx="1" fill="#639922" opacity="0.4"/>
        <circle cx="30" cy="34" r="8" fill="#eaf3de" stroke="#639922" stroke-width="2"/>
        <polygon points="30,27 31.8,31.4 36.5,31.4 32.8,34.2 34.2,38.5 30,35.8 25.8,38.5 27.2,34.2 23.5,31.4 28.2,31.4" fill="#97c459"/>
      </svg>
      <h3>Certificate</h3>
      <p>Validate &amp; manage certificates</p>
      <div class="card-arrow">
        <svg width="10" height="10" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>

    <div class="card" onclick="selectCard(this,'REPORT')">
      <svg class="card-icon" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
        <rect x="8" y="6" width="28" height="32" rx="3" fill="#faeeda"/>
        <rect x="12" y="18" width="4" height="14" rx="2" fill="#ba7517" opacity="0.5"/>
        <rect x="18" y="14" width="4" height="18" rx="2" fill="#ba7517" opacity="0.7"/>
        <rect x="24" y="10" width="4" height="22" rx="2" fill="#ba7517" opacity="0.9"/>
        <circle cx="34" cy="36" r="6" fill="#854f0b"/>
        <rect x="31.5" y="35.2" width="5" height="1.5" rx="0.75" fill="white"/>
        <rect x="33.2" y="33" width="1.5" height="5" rx="0.75" fill="white"/>
      </svg>
      <h3>Report</h3>
      <p>Generate &amp; view detailed reports</p>
      <div class="card-arrow">
        <svg width="10" height="10" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>

  </div>

  <div id="result"></div>

  <div class="footer-badges">
    <span class="badge">
      <span class="badge-dot bd-green">
        <svg width="10" height="10" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" fill="none" stroke="#0f6e56" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>Secure
    </span>
    <span class="badge">
      <span class="badge-dot bd-blue">
        <svg width="10" height="10" viewBox="0 0 12 12"><circle cx="6" cy="6" r="4" fill="none" stroke="#185fa5" stroke-width="1.5"/><line x1="6" y1="3.5" x2="6" y2="6.5" stroke="#185fa5" stroke-width="1.5" stroke-linecap="round"/><circle cx="6" cy="8" r="0.6" fill="#185fa5"/></svg>
      </span>Fast
    </span>
    <span class="badge">
      <span class="badge-dot bd-teal">
        <svg width="10" height="10" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" fill="none" stroke="#0f6e56" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>Accurate
    </span>
    <span class="badge">
      <span class="badge-dot bd-gray">
        <svg width="10" height="10" viewBox="0 0 12 12"><rect x="2.5" y="5" width="7" height="5" rx="1" fill="none" stroke="#5f5e5a" stroke-width="1.4"/><path d="M4 5V4a2 2 0 0 1 4 0v1" fill="none" stroke="#5f5e5a" stroke-width="1.4" stroke-linecap="round"/></svg>
      </span>Reliable
    </span>
  </div>

</div>

<script>
  let selectedType = 'CHEQUE';
  function selectCard(el, type) {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    selectedType = type;
    document.getElementById('result').textContent = '';
  }
  function doSearch() {
    const val = document.getElementById('code').value.trim();
    if (!val) return;
    const r = document.getElementById('result');
    r.className = '';
    r.textContent = 'Verifying…';
    setTimeout(() => {
      const states = ['valid','invalid','used'];
      const msgs = {
        valid: `✓ ${selectedType} Match Confirmed.`,
        invalid: `✗ ${selectedType} Match Unconfirmed.`,
        used: `⚠ ${selectedType} Match Confirmed.`
      };
      const s = states[Math.floor(Math.random()*3)];
      r.className = s;
      r.textContent = msgs[s];
    }, 900);
  }
  document.getElementById('code').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });
</script>
</body>
</html>
