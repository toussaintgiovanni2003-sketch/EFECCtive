<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Effective Verification</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <div class="hero">
        <h1>EFFEC<span>tive</span></h1>
        <p>Timely verification. Trusted Protection.</p>

        <div class="search-box">
            <input id="code" placeholder="Enter cheque code...">
            <button onclick="verify()">→</button>
        </div>
    </div>

    <div class="cards">

        <div class="card active">
            <h3>CHEQUE</h3>
            <p>Verify bank cheque</p>
        </div>

        <div class="card">
            <h3>DOCUMENT</h3>
        </div>

        <div class="card">
            <h3>CERTIFICATE</h3>
        </div>

        <div class="card">
            <h3>REPORT</h3>
        </div>

    </div>

    <div id="result"></div>

</div>

<script>
function verify(){
    const code = document.getElementById("code").value;

    fetch("/verify", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({code: code})
    })
    .then(res => res.json())
    .then(data => {
        const result = document.getElementById("result");
        result.innerText = data.message;
        result.className = data.status;
    });
}
</script>

</body>
</html>
